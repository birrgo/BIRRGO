<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biometric Scan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-burgundy: #8b0015;
            --success-green: #10b981;
            --text-dark: #111827;
            --text-muted: #6b7280;
            --bg-overlay: rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Simulates the dark background of the app behind the modal */
            background-color: var(--bg-overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .modal-card {
            background: #ffffff;
            width: 90%;
            max-width: 360px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-bottom: 40px;
        }

        .modal-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f3f4f6;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .modal-close-btn {
            border: none;
            background: none;
            font-size: 22px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .biometric-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
        }

        .fingerprint-ring {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px dashed var(--primary-burgundy);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .fingerprint-icon {
            width: 85px;
            height: 85px;
            object-fit: contain;
            mix-blend-mode: multiply; /* Removes white bg from jpg */
            opacity: 0.9;
            transition: all 0.3s ease;
        }

        .scan-beam {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(139,0,21,0) 0%, rgba(139,0,21,0.2) 80%, rgba(139,0,21,0.6) 100%);
            animation: scanAnim 1.8s infinite linear;
            pointer-events: none;
        }

        @keyframes scanAnim {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        .status-text {
            margin-top: 24px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
            transition: color 0.3s ease;
            text-align: center;
        }

        /* --- Success State Styles --- */
        .fingerprint-ring.success {
            border: 3px solid var(--success-green);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }

        .fingerprint-ring.success .scan-beam {
            display: none; /* Hide red beam on success */
        }

        .fingerprint-ring.success .fingerprint-icon {
            /* Converts the burgundy/black jpg to green */
            filter: sepia(1) hue-rotate(90deg) saturate(3) drop-shadow(0 0 6px rgba(16, 185, 129, 0.3));
            opacity: 1;
        }

        .status-text.success {
            color: var(--success-green);
        }

        /* --- Error State Styles --- */
        .status-text.error {
            color: #df2222;
        }
    </style>
</head>
<body>

    <div class="modal-card">
        <div class="modal-header">
            <span class="modal-title">Biometric Login</span>
            <button class="modal-close-btn" aria-label="Close" onclick="handleFallback()">✕</button>
        </div>
        
        <div class="biometric-body">
            <!-- Clickable ring area to re-trigger scan if needed -->
            <div class="fingerprint-ring" id="sensorTouchArea">
                <img src="fi.jpg" alt="Fingerprint" class="fingerprint-icon" id="fingerprintImage">
                <div class="scan-beam" id="scanBeam"></div>
            </div>

            <p class="status-text" id="statusMessage">Scanning fingerprint...</p>
        </div>
    </div>

    <script>
        const statusMsg = document.getElementById('statusMessage');
        const touchArea = document.getElementById('sensorTouchArea');
        
        const targetOrigin = "*";
        const SIMULATE_SUCCESS_ON_HTTP = true; 
        let incomingToggleStateOverride = null;

        function onFingerprintSuccess(verificationToken) {
            // Apply success UI states matching the screenshot
            statusMsg.innerText = "Authentication Successful!";
            statusMsg.className = "status-text success";
            touchArea.className = "fingerprint-ring success";
            
            // Post message back to parent or redirect
            window.parent.postMessage({ 
                status: 'SUCCESS', 
                token: verificationToken 
            }, targetOrigin); 

            // Auto-redirect to dashboard after showing success state for 1 second
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1200);
        }

        function onFingerprintFailure(err) {
            statusMsg.innerText = err || "Failed";
            statusMsg.className = "status-text error";
            touchArea.className = "fingerprint-ring"; // Revert to default
            
            window.parent.postMessage({ 
                status: 'FAILED', 
                error: err 
            }, targetOrigin);
        }

        function base64ToBuffer(base64) {
            const binary = window.atob(base64.replace(/-/g, '+').replace(/_/g, '/'));
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        async function startBiometricScan() {
            // Reset UI to scanning state
            statusMsg.innerText = "Scanning fingerprint...";
            statusMsg.className = "status-text";
            touchArea.className = "fingerprint-ring";

            let isConfiguredOn = true;
            if (incomingToggleStateOverride !== null) {
                isConfiguredOn = incomingToggleStateOverride;
            } else {
                try {
                    isConfiguredOn = localStorage.getItem('biometrics_enabled') !== 'false';
                } catch(e) {
                    isConfiguredOn = true; 
                }
            }

            // 1. Android Native Interface Hook
            if (window.AndroidInterface && typeof window.AndroidInterface.requestFingerprint === 'function') {
                try {
                    window.AndroidInterface.requestFingerprint();
                } catch (err) {
                    onFingerprintFailure("Hardware interface failed.");
                }
                return;
            }

            const cleanHostname = window.location.hostname || "localhost";
            const isSecureContext = window.location.protocol === 'https:' || cleanHostname === 'localhost' || cleanHostname === '127.0.0.1';

            // 2. HTTP Sandbox / Local Server Bypass Simulation Connect
            if (!isSecureContext && SIMULATE_SUCCESS_ON_HTTP) {
                // Simulate a 2.5 second scan before succeeding (to show off the animation)
                setTimeout(() => {
                    onFingerprintSuccess("simulated-http-token");
                }, 2500);
                return;
            }

            // 3. Native WebAuthn API Call
            const isWebAuthnSupported = window.PublicKeyCredential && 
                                        typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function' &&
                                        isSecureContext;

            if (isWebAuthnSupported) {
                try {
                    const isBioAvailable = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                    if (isBioAvailable) {
                        let savedCredId = null;
                        try {
                            savedCredId = localStorage.getItem('webauthn_credential_id');
                        } catch(e) {}

                        if (!savedCredId) {
                            statusMsg.innerText = "Registering biometric profile...";
                            const challenge = new Uint8Array(32);
                            window.crypto.getRandomValues(challenge);
                            const userId = new Uint8Array(16);
                            window.crypto.getRandomValues(userId);

                            const createOptions = {
                                publicKey: {
                                    challenge: challenge,
                                    rp: { name: "Secure Fingerprint Portal", id: cleanHostname },
                                    user: { id: userId, name: "user@example.com", displayName: "Authorized User" },
                                    pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                                    authenticatorSelection: { 
                                        authenticatorAttachment: "platform", 
                                        userVerification: "required" 
                                    },
                                    timeout: 60000
                                }
                            };

                            const credential = await navigator.credentials.create(createOptions);
                            if (credential) {
                                const rawId = new Uint8Array(credential.rawId);
                                let binary = '';
                                for (let i = 0; i < rawId.byteLength; i++) {
                                    binary += String.fromCharCode(rawId[i]);
                                }
                                const base64Id = btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
                                try {
                                    localStorage.setItem('webauthn_credential_id', base64Id);
                                } catch(e) {}
                                onFingerprintSuccess("registered-and-verified");
                            } else {
                                onFingerprintFailure("Registration cancelled.");
                            }
                        } else {
                            const challenge = new Uint8Array(32);
                            window.crypto.getRandomValues(challenge);

                            const getOptions = {
                                publicKey: {
                                    challenge: challenge,
                                    rpId: cleanHostname,
                                    allowCredentials: [{ id: base64ToBuffer(savedCredId), type: "public-key" }],
                                    userVerification: "required",
                                    timeout: 60000
                                }
                            };

                            const assertion = await navigator.credentials.get(getOptions);
                            if (assertion) {
                                onFingerprintSuccess("assertion-success");
                            } else {
                                onFingerprintFailure("Verification failed.");
                            }
                        }
                        return;
                    }
                } catch (e) {
                    if (e.name === "NotAllowedError") {
                        onFingerprintFailure("Dismissed by user.");
                        return;
                    }
                    onFingerprintFailure(e.message || "Device biometrics failed.");
                    return;
                }
            }

            onFingerprintFailure("Unsupported device API. Must use HTTPS or Localhost.");
        }

        window.onAndroidBiometricResult = function(success, data) {
            if (success) {
                onFingerprintSuccess(data || "native-token");
            } else {
                onFingerprintFailure(data || "Scan failed.");
            }
        };

        function handleFallback() {
            window.parent.postMessage({ status: 'FALLBACK_REQUESTED' }, targetOrigin);
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.location.href = "new2.html";
                } else {
                    window.location.href = "new2.html";
                }
            } catch (e) {
                window.location.href = "new2.html";
            }
        }

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'UPDATE_BIOMETRIC_STATUS') {
                incomingToggleStateOverride = event.data.enabled;
                startBiometricScan();
            }
        });

        // Initialize scan shortly after page load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(startBiometricScan, 400); 
        });

        // Allow user to tap the fingerprint circle to restart the scan if it fails
        touchArea.addEventListener('click', () => {
            if (!touchArea.classList.contains('success')) {
                startBiometricScan();
            }
        });
    </script>
</body>
</html>

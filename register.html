<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="google" content="notranslate">
    
    <!-- ADVANCED SEO BLOCK -->
    <title>Create BirrGo Account | Secure Mobile Wallet Registration Ethiopia</title>
    <meta name="description" content="Sign up for a secure BirrGo mobile wallet account. Register today to send, receive, and manage your money safely and instantly in Ethiopia.">
    <meta name="keywords" content="BirrGo registration, create mobile wallet, sign up BirrGo, digital wallet Ethiopia, mobile money account, secure payment">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://birrgo.online/register.html">

    <!-- Open Graph Meta Tags for Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Create Your BirrGo Account | Secure Mobile Wallet">
    <meta property="og:description" content="Join BirrGo today! Register for your secure mobile wallet and manage digital payments safely in Ethiopia.">
    <meta property="og:url" content="https://birrgo.online/register.html">
    <meta property="og:site_name" content="BirrGo">

    <!-- Schema.org WebPage Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Create BirrGo Account",
      "url": "https://birrgo.online/register.html",
      "description": "Secure registration portal for new BirrGo Mobile Wallet users in Ethiopia.",
      "publisher": {
        "@type": "Organization",
        "name": "BirrGo"
      }
    }
    </script>

    <!-- PWA Root App Integration Linkage -->
    <link rel="manifest" href="manifest.json">
    
    <!-- PWA / Mobile App Meta Tags -->
    <meta name="theme-color" content="#800020">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- FAVICON LOGO -->
    <link rel="icon" href="birrgo-logo.png" type="image/png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Preload fonts to prevent layout shifts/breaks on low connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <div class="modal-overlay" id="countryModalOverlay">
        <div class="modal-card">
            <div class="modal-search-wrapper">
                <input type="text" id="modalSearchInput" class="modal-search" placeholder="Search country or code..." autocomplete="off">
            </div>
            <div class="country-list-scroll" id="countryListScroll"></div>
        </div>
    </div>

    <!-- Top Wave Gradient Match -->
    <svg class="bg-wave bg-wave-top" viewBox="0 0 375 200" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0H375V65C375 65 280 155 0 95V0Z" fill="url(#paint0_linear)"/>
        <defs>
            <linearGradient id="paint0_linear" x1="187.5" y1="0" x2="187.5" y2="200" gradientUnits="userSpaceOnUse">
                <stop stop-color="#4a0012"/>
                <stop offset="1" stop-color="#800020"/>
            </linearGradient>
        </defs>
    </svg>

    <!-- Bottom Wave Match -->
    <svg class="bg-wave bg-wave-bottom" viewBox="0 0 375 90" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M375 90H0V70C120 62 250 55 375 65V90Z" fill="#2b000a"/>
    </svg>

    <div class="toast-container" id="toast-message" role="alert"></div>

    <div class="header-top-area">
        <button id="navBackBtn" class="back-btn" aria-label="Go back" title="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"/>
            </svg>
        </button>
    </div>

    <!-- App View Wrapper aligned with login framework heights -->
    <main class="app-view">
        <div class="app-content-wrapper">
            <header class="header-content">
                <h1 id="screen-title">Create Your <span style="color: var(--primary-burgundy);">Account</span></h1>
                <p id="referrer-label">Enter your details to get started with BirrGo.</p>
            </header>

            <div class="step-indicator">
                <span id="stepDot1" class="step-dot-active"></span>
                <span id="stepText1">1. Details</span>
                <span id="stepDot2" class="step-dot"></span>
                <span id="stepText2">2. Verify</span>
                <span class="step-dot"></span>
                <span class="step-dot"></span>
            </div>

            <form class="registration-form" id="signupForm">
                <div class="input-group">
                    <label class="field-label" for="regName">Full Name <span class="label-highlight">*</span></label>
                    <input type="text" id="regName" class="input-box" placeholder="First Middle Last" required autocomplete="off">
                    <div class="input-icon-right">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                </div>

                <div class="input-group phone-input-wrapper">
                    <label class="field-label" for="regPhone">Phone Number <span class="label-highlight">*</span></label>
                    
                    <div class="country-trigger" id="countryTriggerBtn">
                        <span class="trigger-flag" id="currentFlag">🇪🇹</span>
                        <span class="trigger-code" id="currentCode">+251</span>
                        <span class="trigger-arrow">▼</span>
                    </div>

                    <input type="tel" id="regPhone" class="input-box phone-indent" placeholder="9xxxxxxxx" required autocomplete="off">
                    <div class="input-icon-right">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                    </div>
                </div>

                <div class="input-group">
                    <label class="field-label" for="regEmail">Email Address <span class="label-highlight">*</span></label>
                    <input type="email" id="regEmail" class="input-box" placeholder="example@mail.com" required autocomplete="off">
                    <div class="input-icon-right">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                </div>

                <div class="input-group">
                    <label class="field-label" for="regPin">Create Pin (6-digits) <span class="label-highlight">*</span></label>
                    <input type="password" id="regPin" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" class="input-box" placeholder="••••••" required autocomplete="off">
                    <div class="input-icon-right">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                </div>

                <div class="input-group">
                    <label class="field-label" for="regConfirmPin">Confirm Pin <span class="label-highlight">*</span></label>
                    <input type="password" id="regConfirmPin" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" class="input-box" placeholder="••••••" required autocomplete="off">
                    <div class="input-icon-right">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                </div>

                <div class="form-action-area">
                    <button type="submit" id="submitBtn" class="btn-submit">Continue to Verification</button>
                    
                    <div class="login-redirect-footer">
                        Already have an account? <a href="new2.html"><span>Log In</span></a>
                    </div>
                </div>
            </form>

            <div class="verification-view" id="otpView">
                <div class="otp-container" id="otpInputsWrapper">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                </div>

                <p class="resend-text">Didn't receive the email? <span id="resendCodeBtn" class="resend-link disabled">Resend in (30s)</span></p>

                <div class="form-action-area" style="margin-top:20px;">
                    <button type="button" id="verifyOtpBtn" class="btn-submit">Verify OTP & Create Account</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="register.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirrGo - Push Notification Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; max-width: 400px; display: flex; justify-content: flex-start; margin-bottom: 15px; box-sizing: border-box; }
        .back-btn { background: #555; color: white; text-decoration: none; padding: 8px 14px; border-radius: 6px; font-size: 14px; font-weight: bold; display: inline-flex; align-items: center; transition: background 0.2s; }
        .back-btn:hover { background: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border-top: 5px solid #8B0000; margin-bottom: 20px; box-sizing: border-box; }
        h2 { color: #8B0000; margin-top: 0; font-size: 22px; }
        label { font-weight: bold; display: block; margin: 12px 0 5px; color: #333; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; margin-bottom: 5px;}
        button { background: #8B0000; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; margin-top: 15px; cursor: pointer; transition: background 0.2s;}
        button:hover { background: #660000; }
        button:disabled { background: #999; cursor: not-allowed; }
        #status { margin-top: 12px; font-weight: bold; text-align: center; font-size: 14px; word-break: break-word; }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="new.html" class="back-btn">← Back to Dashboard</a>
</div>

<div class="card">
    <h2>BirrGo Notification Panel</h2>
    <p style="font-size: 14px; color: #555;">Broadcast a live message to your active subscribers:</p>
    
    <form id="push-form" onsubmit="sendPush(event)">
        <label for="title">Notification Title</label>
        <input type="text" id="title" placeholder="e.g., Cash Received! 💰" required>

        <label for="message">Message Body</label>
        <textarea id="message" rows="3" placeholder="e.g., You received 500 Birr." required></textarea>

        <label for="imageUrl">Image URL (Optional)</label>
        <input type="url" id="imageUrl" placeholder="https://birrgo.online/banner.jpg">

        <button type="submit" id="send-btn">Broadcast Notification</button>
    </form>
    
    <div id="status"></div>
</div>

<script>
  async function sendPush(event) {
      event.preventDefault();

      const title = document.getElementById('title').value.trim();
      const message = document.getElementById('message').value.trim();
      const imageUrl = document.getElementById('imageUrl').value.trim();
      const statusDiv = document.getElementById('status');
      const sendBtn = document.getElementById('send-btn');

      if (!title || !message) {
          statusDiv.style.color = '#d9534f';
          statusDiv.innerText = 'Title and Message are required!';
          return;
      }

      statusDiv.style.color = '#f59e0b';
      statusDiv.innerText = 'Broadcasting via Vercel Microservice...';
      sendBtn.disabled = true;

      try {
          const response = await fetch("/api/send-push", {
              method: "POST",
              headers: {
                  "Content-Type": "application/json"
              },
              body: JSON.stringify({
                  title: title,
                  message: message,
                  imageUrl: imageUrl || null,
                  url: "https://birrgo.online"
              })
          });

          const responseData = await response.json();

          if (response.ok && responseData.success) {
              statusDiv.style.color = '#10b981';
              statusDiv.innerText = `🚀 Success! Sent to ${responseData.recipients || 0} recipients.`;
              document.getElementById('push-form').reset();
          } else {
              let errorMsg = responseData.error || responseData.message || `Status ${response.status}`;
              statusDiv.style.color = '#d9534f';
              statusDiv.innerText = 'Error: ' + errorMsg;
          }
      } catch (error) {
          console.error("Push Service Error:", error);
          statusDiv.style.color = '#d9534f';
          statusDiv.innerText = 'Network error: ' + error.message;
      } finally {
          sendBtn.disabled = false;
      }
  }
</script>

</body>
</html>
